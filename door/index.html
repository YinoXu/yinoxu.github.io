<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>door</title>
    <link rel="icon" href="../favicon.svg?v=9" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        --paper: #f7f4ec;
        --paper-deep: #eee8dc;
        --ink: #202221;
        --soft-ink: #67645e;
        --line: #d8d0c3;
        --field: #fffcf5;
        --accent: #8e5149;
        --accent-dark: #61332f;
        --sage: #5d7468;
        --shadow: rgba(54, 45, 35, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.32), transparent 42%),
          var(--paper);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      a {
        color: inherit;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .gate {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 28px;
      }

      .gate-panel {
        width: min(100%, 380px);
        border-top: 1px solid var(--line);
        padding-top: 34px;
      }

      .gate-mark {
        display: block;
        width: 34px;
        height: 34px;
        margin-bottom: 34px;
        opacity: 0.72;
      }

      .gate-word {
        margin: 0 0 34px;
        font-family: "Songti SC", "STSong", "Noto Serif SC", Georgia, serif;
        font-size: clamp(2.8rem, 12vw, 5.6rem);
        font-weight: 400;
        line-height: 0.92;
        letter-spacing: 0;
      }

      .gate-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .gate-input {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 0;
        background: var(--field);
        color: var(--ink);
        padding: 12px 13px;
        outline: none;
      }

      .gate-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(142, 81, 73, 0.12);
      }

      .gate-button,
      .lock-button {
        border: 1px solid var(--ink);
        border-radius: 0;
        background: var(--ink);
        color: var(--field);
        cursor: pointer;
        padding: 12px 17px;
      }

      .gate-button:disabled {
        cursor: wait;
        opacity: 0.6;
      }

      .gate-message {
        min-height: 1.6em;
        grid-column: 1 / -1;
        margin: 2px 0 0;
        color: var(--accent-dark);
        font-size: 0.92rem;
      }

      .room {
        display: none;
      }

      .is-open .gate {
        display: none;
      }

      .is-open .room {
        display: block;
      }

      .room-header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(247, 244, 236, 0.92);
        padding: 16px clamp(18px, 4vw, 58px);
        backdrop-filter: blur(14px);
      }

      .room-brand {
        display: inline-flex;
        align-items: center;
        gap: 11px;
        color: var(--soft-ink);
        font-size: 0.9rem;
        letter-spacing: 0;
      }

      .room-brand img {
        width: 22px;
        height: 22px;
        opacity: 0.68;
      }

      .lock-button {
        border-color: var(--line);
        background: transparent;
        color: var(--ink);
        padding: 8px 13px;
      }

      .room-layout {
        display: grid;
        grid-template-columns: minmax(160px, 230px) minmax(0, 760px);
        gap: clamp(28px, 6vw, 92px);
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: clamp(34px, 7vw, 86px) clamp(18px, 4vw, 58px) 88px;
      }

      .poem-index {
        position: sticky;
        top: 88px;
        align-self: start;
        border-top: 1px solid var(--line);
        padding-top: 18px;
      }

      .poem-index a {
        display: block;
        width: 100%;
        border: 0;
        border-bottom: 1px solid rgba(216, 208, 195, 0.62);
        background: transparent;
        color: var(--soft-ink);
        padding: 11px 0;
        text-align: left;
        text-decoration: none;
      }

      .poem-index a:focus,
      .poem-index a:hover {
        color: var(--accent-dark);
      }

      .poem-shelf {
        border-top: 1px solid var(--line);
      }

      .poem {
        display: grid;
        gap: 18px;
        padding: clamp(34px, 6vw, 64px) 0;
        border-bottom: 1px solid var(--line);
        scroll-margin-top: 86px;
      }

      .poem-number {
        color: var(--sage);
        font-size: 0.82rem;
      }

      .poem h2 {
        margin: 0;
        font-family: "Songti SC", "STSong", "Noto Serif SC", Georgia, serif;
        font-size: clamp(2rem, 5vw, 3.6rem);
        font-weight: 400;
        line-height: 1.08;
        letter-spacing: 0;
      }

      .poem-body {
        max-width: 68ch;
        margin: 0;
        color: #282724;
        font-family: "Songti SC", "STSong", "Noto Serif SC", Georgia, serif;
        font-size: clamp(1.05rem, 2vw, 1.2rem);
        line-height: 2.05;
        letter-spacing: 0;
        white-space: pre-wrap;
      }

      @media (max-width: 760px) {
        .gate-form {
          grid-template-columns: 1fr;
        }

        .gate-button {
          width: 100%;
        }

        .room-header {
          padding: 13px 18px;
        }

        .room-layout {
          display: block;
          padding: 28px 18px 72px;
        }

        .poem-index {
          position: sticky;
          top: 57px;
          z-index: 4;
          display: flex;
          gap: 18px;
          overflow-x: auto;
          border-bottom: 1px solid var(--line);
          background: rgba(247, 244, 236, 0.94);
          padding: 12px 0 10px;
          scrollbar-width: none;
        }

        .poem-index::-webkit-scrollbar {
          display: none;
        }

        .poem-index a {
          flex: 0 0 auto;
          border-bottom: 0;
          padding: 7px 0;
          white-space: nowrap;
        }

        .poem-shelf {
          border-top: 0;
        }
      }
    </style>
  </head>
  <body>
    <section class="gate" aria-labelledby="gate-title">
      <div class="gate-panel">
        <img class="gate-mark" src="../favicon.svg?v=9" alt="" />
        <h1 id="gate-title" class="gate-word">door</h1>
        <form class="gate-form" id="gate-form" autocomplete="off">
          <label class="sr-only" for="door-key">密码</label>
          <input
            class="gate-input"
            id="door-key"
            name="door-key"
            type="password"
            inputmode="numeric"
            autocomplete="off"
            placeholder="password"
            required
          />
          <button class="gate-button" type="submit">Enter</button>
          <p class="gate-message" id="gate-message" role="status"></p>
        </form>
      </div>
    </section>

    <section class="room" aria-label="poems">
      <header class="room-header">
        <div class="room-brand">
          <img src="../favicon.svg?v=9" alt="" />
          <span>door</span>
        </div>
        <button class="lock-button" id="lock-door" type="button">Lock</button>
      </header>
      <main class="room-layout">
        <nav class="poem-index" id="poem-index" aria-label="目录"></nav>
        <section class="poem-shelf" id="poem-shelf" aria-label="诗歌"></section>
      </main>
    </section>

      function fromBase64(value) {
        const binary = atob(value);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
      }

      async function deriveKey(password) {
        const encoder = new TextEncoder();
        const material = await crypto.subtle.importKey(
          "raw",
          encoder.encode(password),
          "PBKDF2",
          false,
          ["deriveKey"],
        );
        return crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: fromBase64(DOOR_PAYLOAD.salt),
            iterations: DOOR_PAYLOAD.iterations,
            hash: "SHA-256",
          },
          material,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"],
        );
      }

      async function unlockDoor(password) {
        const key = await deriveKey(password);
        const decrypted = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: fromBase64(DOOR_PAYLOAD.iv) },
          key,
          fromBase64(DOOR_PAYLOAD.data),
        );
        return JSON.parse(new TextDecoder().decode(decrypted));
      }

      function renderPoems(poems) {
        const fragment = document.createDocumentFragment();
        const indexFragment = document.createDocumentFragment();

        poems.forEach((poem, position) => {
          const id = `poem-${position + 1}`;
          const link = document.createElement("a");
          link.href = `#${id}`;
          link.textContent = `《${poem.title}》`;
          indexFragment.append(link);

          const article = document.createElement("article");
          article.className = "poem";
          article.id = id;

          const number = document.createElement("div");
          number.className = "poem-number";
          number.textContent = String(position + 1).padStart(2, "0");

          const title = document.createElement("h2");
          title.textContent = `《${poem.title}》`;

          const body = document.createElement("p");
          body.className = "poem-body";
          body.textContent = poem.body;

          article.append(number, title, body);
          fragment.append(article);
        });

        index.replaceChildren(indexFragment);
        shelf.replaceChildren(fragment);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";
        submitButton.disabled = true;

        try {
          const poems = await unlockDoor(input.value.trim());
          renderPoems(poems);
          input.value = "";
          document.body.classList.add("is-open");
          window.scrollTo({ top: 0 });
        } catch (error) {
          message.textContent = "密码不对。";
          input.select();
        } finally {
          submitButton.disabled = false;
        }
      });

      lockButton.addEventListener("click", () => {
        document.body.classList.remove("is-open");
        index.replaceChildren();
        shelf.replaceChildren();
        message.textContent = "";
        requestAnimationFrame(() => input.focus());
      });

      input.focus();
    </script>
  </body>
</html>
